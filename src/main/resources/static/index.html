<!DOCTYPE html>
<html lang="de-ch">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AIgeny</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────────────── -->
<header class="app-header">
  <div class="header-left">
    <canvas id="halEyeMini" width="32" height="32"></canvas>
    <span class="app-title">AIgeny</span>
  </div>
  <div class="header-right" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Verbinde...</span>
  </div>
</header>

<!-- ── Main layout ────────────────────────────────────────────────────── -->
<main class="app-main">

  <!-- HAL Eye panel -->
  <aside class="hal-panel">
    <canvas id="halEye" width="220" height="220"></canvas>
    <div class="hal-label">AIgeny</div>
  <div class="hal-status" id="halStatusText">Bereit, Towarischtsch.</div>
  <div class="info-box" id="infoBox">
      <div class="info-row"><span class="info-key">LLM</span><span class="info-val" id="infoLlm">—</span></div>
      <div class="info-row"><span class="info-key">Modell</span><span class="info-val" id="infoModel">—</span></div>
      <div class="info-row"><span class="info-key">DB</span><span class="info-val" id="infoDb">—</span></div>
      <div class="info-row">
        <span class="info-key">Jira</span>
        <span class="info-val" id="infoJira">—</span>
        <button class="btn-token" id="btnJiraToken" onclick="openJiraTokenModal()" title="Jira Personal Access Token eingeben">Token eingeben</button>
      </div>
      <div class="info-row"><span class="info-key">DB-Tabellen</span><span class="info-val" id="infoTables">—</span></div>
    </div>
    <button class="btn-secondary" onclick="reloadSchema()" title="DB-Schema neu laden">&#8635; DB-Schema neu laden</button>

    <!-- Jira Write Mode Toggle -->
    <div class="write-mode-toggle" id="jiraWriteToggleRow" style="display:none">
      <span class="write-mode-label" id="jiraWriteLabel">&#9998; Jira Schreiben</span>
      <label class="toggle-switch" title="Jira Schreibmodus aktivieren/deaktivieren">
        <input type="checkbox" id="jiraWriteToggle" onchange="toggleJiraWriteMode(this.checked)"/>
        <span class="toggle-slider"></span>
      </label>
    </div>
  </aside>

  <!-- Chat panel -->
  <section class="chat-panel">
    <div class="chat-messages" id="chatMessages">
      <!-- Messages injected by JS -->
    </div>

    <!-- Input area -->
    <div class="input-area">
      <textarea id="userInput"
                placeholder="Stell AIgeny eine Frage zur Datenbank oder zu Jira, Towarischtsch..."
                rows="3"></textarea>
      <button class="btn-send" id="sendBtn" onclick="sendMessage()">
        &#9654; Senden
      </button>
    </div>

    <!-- Export & control bar -->
    <div class="action-bar">
      <button class="btn-export" id="btnCsv" disabled onclick="exportData('csv')" title="Als CSV herunterladen">
        &#8595; CSV exportieren
      </button>
      <button class="btn-secondary" onclick="clearChat()">&#10005; Chat leeren</button>
    </div>
  </section>

</main>

<script src="/js/app.js"></script>

<!-- ── Jira Token Modal ────────────────────────────────────────────────── -->
<div id="jiraTokenModal" class="modal-overlay" style="display:none" onclick="closeJiraTokenModal(event)">
  <div class="modal-box">
    <h2>🔑 Jira Personal Access Token</h2>
    <p class="modal-desc">
      Gib deinen persönlichen Jira-Token ein.<br>
      <strong>Wo findest du den Token?</strong><br>
      Jira öffnen → <em>Profil</em> (oben rechts) → <em>Personal Access Tokens</em> → Token erstellen.
    </p>
    <input type="password" id="jiraTokenInput" class="modal-input"
           placeholder="Token eingeben..." autocomplete="off"/>
    <div class="modal-hint" id="jiraTokenHint"></div>
    <div class="modal-actions">
      <button class="btn-send" onclick="saveJiraToken()">💾 Speichern</button>
      <button class="btn-secondary" onclick="clearJiraToken()">🗑 Token löschen</button>
      <button class="btn-secondary" onclick="closeJiraTokenModal()">Abbrechen</button>
    </div>
  </div>
</div>
</body>
</html>
