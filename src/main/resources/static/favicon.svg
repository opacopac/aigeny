<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Option B: High-Contrast Glow – brighter orange-red, visible on any browser theme -->
  <defs>
    <radialGradient id="b-outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#1a0000"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="b-iris" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff6600"/>
      <stop offset="40%"  stop-color="#ee1100"/>
      <stop offset="75%"  stop-color="#aa0000"/>
      <stop offset="100%" stop-color="#330000"/>
    </radialGradient>
    <radialGradient id="b-lens" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#ff8844"/>
      <stop offset="50%"  stop-color="#ff3300"/>
      <stop offset="100%" stop-color="#990000"/>
    </radialGradient>
    <filter id="b-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <circle cx="16" cy="16" r="16" fill="url(#b-outer)"/>
  <!-- Glowing iris -->
  <circle cx="16" cy="16" r="12" fill="url(#b-iris)" filter="url(#b-glow)"/>
  <!-- Inner lens -->
  <circle cx="16" cy="16" r="5.8" fill="url(#b-lens)"/>
  <!-- Pupil -->
  <circle cx="16" cy="16" r="2.8" fill="#020000"/>
  <!-- Highlight -->
  <circle cx="13.8" cy="13.8" r="1.2" fill="rgba(255,210,180,0.5)"/>
</svg>

