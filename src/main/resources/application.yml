spring:
  application:
    name: AIgeny
  # Load optional external config from ~/.aigeny/aigeny.yml (overrides everything below)
  config:
    import: "optional:file:${user.home}/.aigeny/aigeny.yml"
  mvc:
    async:
      request-timeout: 300000   # 5 min – Ollama on CPU can be slow

server:
  port: 8080

# ── AIgeny configuration ──────────────────────────────────────────────────────
# Override via environment variables (Spring Boot auto-mapping):
#   aigeny.llm.api-key  →  AIGENY_LLM_API_KEY
#   aigeny.db.password  →  AIGENY_DB_PASSWORD
# Or use Docker-secret _FILE variants:
#   AIGENY_LLM_API_KEY_FILE=/run/secrets/llm_api_key
#   AIGENY_DB_PASSWORD_FILE=/run/secrets/db_password
#
# ── Supported LLM providers ───────────────────────────────────────────────────
#
#  provider         adapter              notes
#  ───────────────  ───────────────────  ──────────────────────────────────────
#  claude           AnthropicAdapter     native Anthropic API
#  github-copilot   GitHubCopilotAdapter OAuth device-flow; no api-key needed
#  openai           OpenAiCompatibleAdapter
#  ollama           OpenAiCompatibleAdapter  local, base-url: http://localhost:11434/v1
#  azure            OpenAiCompatibleAdapter
#  groq             OpenAiCompatibleAdapter  free cloud tier, rate-limited
#  grok             OpenAiCompatibleAdapter  xAI Grok
#  <anything else>  OpenAiCompatibleAdapter  fallback
#
# ─────────────────────────────────────────────────────────────────────────────
aigeny:
  # ── Default LLM – override in ~/.aigeny/aigeny.yml or via env vars ──────────
  llm:
    provider: github-copilot
    model: claude-sonnet-4.6

  #llm:
  #  provider: claude
  #  api-key: ""
  #  base-url: https://api.anthropic.com/v1
  #  model: claude-sonnet-4-6

  db:
    url: ""
    username: ""
    password: ""   # or AIGENY_DB_PASSWORD_FILE for Docker secrets
    schema: ""     # optional: Oracle schema if different from username (e.g. username=readonly_user, schema=MYAPP)

  jira:
    base-url: ""   # e.g. https://jira.example.com  – token entered via UI

  bitbucket:
    base-url: ""   # e.g. https://git.example.com   – token entered via UI

# ── Logging ───────────────────────────────────────────────────────────────────
logging:
  level:
    com.tschanz.aigeny: DEBUG
    com.zaxxer.hikari: WARN
  file:
    name: ${user.home}/.aigeny/aigeny.log
