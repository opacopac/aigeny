jira.update.tool_description=Update fields of an existing Jira issue (summary, description, and/or duedate). \
  IMPORTANT: Only works when Jira write mode is enabled in the UI sidebar (toggle "Jira Schreiben"). \
  If write mode is disabled, the tool will return an error - do NOT ask for confirmation in that case. \
  If write mode is enabled, a confirmation dialog will be shown to the user inline in the chat. \
  Provide ''issueKey'' and at least one of ''summary'', ''description'', or ''duedate''.
